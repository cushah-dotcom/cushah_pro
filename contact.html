<section class="page-title" style="background: #f4f4f4; padding: 50px 20px; text-align: center;">
    <h1 style="color: #0b3d91;">Get In Touch</h1>
    <p>We are here to answer your questions about admissions and school activities.</p>
</section>

<section id="contact" class="section">
    
    <div class="contact-grid">
        <form onsubmit="sendWhatsApp();return false;">
            <input id="parent" placeholder="Parent Name" required>
            <input id="student" placeholder="Student Name" required>
            <input id="class" placeholder="Class Applying For">
            <input id="phone" placeholder="Mobile Number" required>
            <textarea id="msg" placeholder="Message"></textarea>
            <button type="submit">Submit via WhatsApp</button>
        </form>
        <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3768.0055925494858!2d72.8550915752309!3d19.194958082034294!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7b6c4ffffffff%3A0x8cfbfae97d346736!2sCu%20Shah%20High%20School%20%26%20college!5e0!3m2!1sen!2sin!4v1774203468349!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>
</section>
